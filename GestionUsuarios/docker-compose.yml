services:
  postgres:
    image: postgres:16

    container_name: postgres-gestion-usuarios

    environment:
      POSTGRES_DB: gestion_usuarios
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pruebas

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: